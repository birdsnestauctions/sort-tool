<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNA Lot Sort Order Tool</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f3;
    color: #1a1a1a;
    min-height: 100vh;
  }

  header {
    background: #2D6B5E;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 17px; font-weight: 500; }
  header span { font-size: 13px; opacity: 0.75; }

  #upload-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 52px);
    padding: 40px 24px;
  }

  #drop-zone {
    background: #fff;
    border: 2px dashed #b0cec8;
    border-radius: 16px;
    padding: 60px 48px;
    text-align: center;
    max-width: 480px;
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
    cursor: pointer;
  }
  #drop-zone.drag-over { border-color: #2D6B5E; background: #f0f8f5; }

  .upload-icon {
    width: 48px; height: 48px;
    background: #e8f4f0;
    border-radius: 12px;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg { width: 24px; height: 24px; color: #2D6B5E; }

  #drop-zone h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
  #drop-zone p { font-size: 14px; color: #666; margin-bottom: 24px; line-height: 1.5; }

  .file-btn {
    display: inline-block;
    background: #2D6B5E;
    color: #fff;
    font-size: 14px;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    font-family: inherit;
  }
  .file-btn:hover { background: #235549; }

  .file-note { font-size: 12px; color: #999; margin-top: 16px; }

  #app-screen { display: none; padding: 0 0 60px; }

  #toolbar {
    background: #fff;
    border-bottom: 1px solid #e8e8e6;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  #auction-label {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    min-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #status-msg { font-size: 12px; color: #888; white-space: nowrap; }

  .btn {
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    color: #1a1a1a;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn:hover { background: #f5f5f3; }
  .btn-teal { background: #2D6B5E; color: #fff; border-color: #2D6B5E; }
  .btn-teal:hover { background: #235549; }
  .btn-outline { border-color: #2D6B5E; color: #2D6B5E; }
  .btn-outline:hover { background: #f0f8f5; }
  .btn-ghost { border-color: #ddd; color: #888; font-size: 12px; }
  .btn-ghost:hover { color: #1a1a1a; background: #f5f5f3; }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 12px;
    padding: 20px 24px;
  }

  .card {
    background: #fff;
    border: 1px solid #e8e8e6;
    border-radius: 12px;
    overflow: hidden;
    cursor: grab;
    user-select: none;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: 0.3; }
  .card.drag-over { border: 2px solid #2D6B5E; }
  .card.changed { border-left: 3px solid #2D6B5E; }

  .card-img {
    width: 100%;
    height: 115px;
    object-fit: cover;
    display: block;
    background: #f0f0ee;
  }
  .card-img-placeholder {
    width: 100%;
    height: 115px;
    background: #f0f0ee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #aaa;
  }

  .card-body { padding: 8px 10px 10px; }
  .card-rank { font-size: 11px; font-weight: 600; color: #2D6B5E; margin-bottom: 3px; }
  .card-name {
    font-size: 11px;
    color: #1a1a1a;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta { font-size: 10px; color: #999; margin-top: 3px; }
  .card-badge {
    display: inline-block;
    font-size: 10px;
    background: #f0f0ee;
    color: #888;
    border-radius: 4px;
    padding: 1px 6px;
    margin-top: 4px;
  }

  #error-msg {
    display: none;
    background: #fff3f3;
    border: 1px solid #f5c6c6;
    color: #c0392b;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 20px 24px 0;
    font-size: 13px;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #2D6B5E;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  #file-input { display: none; }
</style>
</head>
<body>

<header>
  <h1>BNA Lot Sort Order Tool</h1>
  <span>Bird's Nest Auctions</span>
</header>

<div id="upload-screen">
  <div id="drop-zone">
    <div class="upload-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <h2>Upload your BidPath CSV</h2>
    <p>Export the custom lot report from BidPath, then drop it here or click to browse. Images load directly from AssetTrax.</p>
    <button class="file-btn" onclick="document.getElementById('file-input').click()">Choose file</button>
    <p class="file-note">Expects columns: ItemNumberConcatenated, LotNumberConcatenated, LotName, LotImage, Sort Order</p>
  </div>
</div>

<input type="file" id="file-input" accept=".csv">

<div id="app-screen">
  <div id="error-msg"></div>
  <div id="toolbar">
    <span id="auction-label">Auction lots</span>
    <span id="status-msg"></span>
    <button class="btn btn-ghost" onclick="resetOrder()">Reset to original</button>
    <button class="btn btn-ghost" onclick="loadNew()">Load new CSV</button>
    <button class="btn btn-outline" onclick="exportBidPath()">Export BidPath CSV</button>
    <button class="btn btn-teal" onclick="exportEstateSales()">Export image rename list</button>
  </div>
  <div id="grid"></div>
</div>

<div class="toast" id="toast"></div>

<script>
var originalLots = [];
var order = [];
var dragSrc = null;
var currentFilename = '';

function parseCSV(text) {
  var lines = text.split(/\r?\n/);
  var results = [];
  var header = null;

  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) continue;
    var cols = splitCSVLine(line);
    if (!header) {
      header = cols.map(function(c) { return c.trim(); });
      continue;
    }
    if (cols.length < 4) continue;
    var row = {};
    for (var j = 0; j < header.length && j < cols.length; j++) {
      row[header[j]] = cols[j];
    }
    results.push(row);
  }
  return results;
}

function splitCSVLine(line) {
  var cols = [];
  var cur = '';
  var inQuote = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') {
      if (inQuote && line[i+1] === '"') { cur += '"'; i++; }
      else { inQuote = !inQuote; }
    } else if (c === ',' && !inQuote) {
      cols.push(cur); cur = '';
    } else {
      cur += c;
    }
  }
  cols.push(cur);
  return cols;
}

function processCSV(text, filename) {
  currentFilename = filename;
  var rows = parseCSV(text);

  var lots = [];
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var imgField = r['LotImage'] || '';
    var imgs = imgField.split('|');
    var firstImg = imgs[0].trim();
    var sortVal = parseInt(r['Sort Order'], 10);
    if (isNaN(sortVal)) sortVal = 9999;
    lots.push({
      item: (r['ItemNumberConcatenated'] || '').trim(),
      lot:  (r['LotNumberConcatenated'] || '').trim(),
      name: (r['LotName'] || '').trim(),
      image: firstImg,
      sort: sortVal,
      origSort: sortVal
    });
  }

  if (lots.length === 0) {
    showError('No lots found. Make sure this is the correct BidPath custom export CSV.');
    return;
  }

  lots.sort(function(a, b) { return a.sort - b.sort; });
  originalLots = JSON.parse(JSON.stringify(lots));
  order = lots;

  document.getElementById('upload-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';

  var base = filename.replace(/\.csv$/i, '');
  document.getElementById('auction-label').textContent = base + ' (' + lots.length + ' lots)';

  render();
}

function render() {
  var grid = document.getElementById('grid');
  var changed = 0;
  for (var i = 0; i < order.length; i++) {
    if ((i + 1) !== order[i].origSort) changed++;
  }
  document.getElementById('status-msg').textContent = changed > 0 ? changed + ' lot' + (changed > 1 ? 's' : '') + ' repositioned' : '';
  grid.innerHTML = '';

  for (var i = 0; i < order.length; i++) {
    (function(lot, rank) {
      var wasChanged = rank !== lot.origSort;
      var card = document.createElement('div');
      card.className = 'card' + (wasChanged ? ' changed' : '');
      card.draggable = true;
      card.dataset.idx = rank - 1;

      var imgHtml = lot.image
        ? '<img class="card-img" src="' + escHtml(lot.image) + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
          + '<div class="card-img-placeholder" style="display:none">no image</div>'
        : '<div class="card-img-placeholder">no image</div>';

      var badgeHtml = (wasChanged && lot.origSort < 9000)
        ? '<div class="card-badge">was #' + lot.origSort + '</div>'
        : (wasChanged ? '<div class="card-badge">was unset</div>' : '');

      card.innerHTML = imgHtml
        + '<div class="card-body">'
        + '<div class="card-rank">#' + rank + '</div>'
        + '<div class="card-name">' + escHtml(lot.name) + '</div>'
        + '<div class="card-meta">Lot ' + escHtml(lot.lot) + ' &middot; Item ' + escHtml(lot.item) + '</div>'
        + badgeHtml
        + '</div>';

      card.addEventListener('dragstart', function(e) {
        dragSrc = card;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', function() {
        card.classList.remove('dragging');
        document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
      });
      card.addEventListener('dragover', function(e) {
        e.preventDefault();
        card.classList.add('drag-over');
      });
      card.addEventListener('dragleave', function() {
        card.classList.remove('drag-over');
      });
      card.addEventListener('drop', function(e) {
        e.preventDefault();
        card.classList.remove('drag-over');
        if (!dragSrc || dragSrc === card) return;
        var srcIdx = parseInt(dragSrc.dataset.idx);
        var tgtIdx = parseInt(card.dataset.idx);
        var moved = order.splice(srcIdx, 1)[0];
        order.splice(tgtIdx, 0, moved);
        render();
      });

      grid.appendChild(card);
    })(order[i], i + 1);
  }
}

function resetOrder() {
  order = JSON.parse(JSON.stringify(originalLots));
  render();
}

function loadNew() {
  document.getElementById('upload-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
  order = [];
  originalLots = [];
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 40);
}

function csvEscape(v) {
  var s = String(v);
  if (s.includes(',') || s.includes('"') || s.includes('\n')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportBidPath() {
  var rows = ['ItemNumberConcatenated,LotNumberConcatenated,LotName,Sort Order'];
  for (var i = 0; i < order.length; i++) {
    var l = order[i];
    rows.push([l.item, l.lot, csvEscape(l.name), i + 1].join(','));
  }
  var base = currentFilename.replace(/\.csv$/i, '');
  download(base + '_sort-updated.csv', rows.join('\n'), 'text/csv');
  toast('BidPath CSV downloaded');
}

function exportEstateSales() {
  var rows = ['new_filename,lot_number,lot_name,image_url'];
  for (var i = 0; i < order.length; i++) {
    var l = order[i];
    var n = String(i + 1).padStart(3, '0');
    var slug = slugify(l.name);
    rows.push([n + '_' + slug + '.jpg', l.lot, csvEscape(l.name), l.image].join(','));
  }
  var base = currentFilename.replace(/\.csv$/i, '');
  download(base + '_estatesales-image-order.csv', rows.join('\n'), 'text/csv');
  toast('Image rename list downloaded');
}

function download(filename, content, type) {
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: type }));
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2200);
}

function showError(msg) {
  var el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

var dropZone = document.getElementById('drop-zone');
var fileInput = document.getElementById('file-input');

dropZone.addEventListener('dragover', function(e) {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', function() {
  dropZone.classList.remove('drag-over');
});
dropZone.addEventListener('drop', function(e) {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  var file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

fileInput.addEventListener('change', function() {
  if (fileInput.files[0]) readFile(fileInput.files[0]);
  fileInput.value = '';
});

function readFile(file) {
  if (!file.name.toLowerCase().endsWith('.csv')) {
    showError('Please upload a .csv file.');
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    processCSV(e.target.result, file.name);
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
